        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;

        }

        /* --- ANIMACIONES --- */
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }

        .slide-up {
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .scale-up {
            animation: scaleUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .animate-pulse-once {
            animation: pulseOnce 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes scaleUp {
            from {
                transform: scale(0.95);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes pulseOnce {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.6;
            }
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* --- SCROLLBARS --- */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* --- UTILIDADES --- */
        .spinner {
            border: 3px solid rgba(37, 99, 235, 0.1);
            border-radius: 50%;
            border-top: 3px solid #2563eb;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        /* --- WIZARD STEPS --- */
        .step-line {
            flex: 1;
            height: 2px;
            background: #e2e8f0;
            margin: 0 12px;
            position: relative;
            top: -10px;
        }

        .step-active .step-line {
            background: #3b82f6;
        }

        .step-completed .step-line {
            background: #10b981;
        }

        .step-circle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            z-index: 10;
            transition: all 0.3s;
            position: relative;
            border: 2px solid transparent;
            background: white;
        }

        .step-active .step-circle {
            background: #3b82f6;
            color: white;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
            border-color: white;
        }

        .step-inactive .step-circle {
            background: #e2e8f0;
            color: #94a3b8;
        }

        .step-completed .step-circle {
            background: #10b981;
            color: white;
        }

        /* --- FIXES VISUALES CRÍTICOS --- */
        /* Permite que los tooltips salgan de la celda de la tabla sin cortarse */
        .overflow-visible {
            overflow: visible !important;
        }

        /* Asegura que el tooltip flote en la capa más alta */
        .z-tooltip {
            z-index: 9999 !important;
        }

        /* Estilos para Inputs y Selects en Tablas */
        td {
            position: relative;
        }

        select option {
            font-size: 14px;
            padding: 4px;
        }

        /* --- PARCHE v1.1: ESTILOS PORTAL --- */
        #portal-root {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 0;
            z-index: 99999;
            /* Máxima prioridad */
            pointer-events: none;
            /* Permitir clics a través del contenedor vacío */

        .portal-tooltip-content {

            animation: fadeIn 0.2s ease-out;
        }
    </style>
</head>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- DICCIONARIO DE PREDICCIÓN ---
        const PREDICTION_DICT = {
            ID: ['RUT', 'ROW_ID', 'VENDOR_LEAD_CODE', 'DDAS_NRT_PPAL', 'ID_CLIENTE', 'ID', 'CEDULA', 'CUENTA'],
            DATE: ['MODIFY_DATE', 'CALL_DATE', 'DATE', 'FECHA_LLAMADA', 'FECHA_GESTION', 'FECHA'],
            ATTEMPTS: ['CALLED_COUNT', 'INTENTOS', 'NIVABS', 'CANTIDAD_LLAMADAS'],
            STATUS: ['STATUS', 'CALL_STATUS_NUM', 'ESTADO_LLAMADA', 'CODIGO_ESTADO', 'COD_RESPUESTA']
        };

        // Helper de Predicción
        const predictColumn = (headers, type) => {
            const keywords = PREDICTION_DICT[type] || [];
            for (const key of keywords) {
                const match = headers.find(h => h.toUpperCase() === key.toUpperCase());
                if (match) return match;
            }
            for (const key of keywords) {
                const match = headers.find(h => h.toUpperCase().includes(key.toUpperCase()));
                if (match) return match;
            }
            return '';
        };

        // --- SERVICIO DE BASE DE DATOS (IndexedDB) ---
        class DBService {
            constructor() {
                this.dbName = 'NexusCC_DB';
                this.version = 2;
                this.db = null;
            }
            async connect() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this.dbName, this.version);
                    request.onupgradeneeded = (event) => {
                        const db = event.target.result;
                        if (!db.objectStoreNames.contains('campaigns')) db.createObjectStore('campaigns', { keyPath: 'code' });
                        if (!db.objectStoreNames.contains('typifications')) {
                            const store = db.createObjectStore('typifications', { keyPath: 'id' });
                            store.createIndex('campaign', 'campaign', { unique: false });
                        }
                        // Nuevo Store para Módulos de Usuario
                        if (!db.objectStoreNames.contains('modules')) {
                            db.createObjectStore('modules', { keyPath: 'id' });
                        }

                    };
                    request.onsuccess = (e) => { this.db = e.target.result; resolve(this.db); };
                    request.onerror = (e) => reject('Error DB');
                });
            }
            async getAll(store) {
                if (!this.db) await this.connect();
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction([store], 'readonly');
                    const req = tx.objectStore(store).getAll();
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => reject(req.error);
                });
            }
            async addOrUpdate(storeName, items) {
                if (!this.db) await this.connect();
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction([storeName], 'readwrite');
                    const store = tx.objectStore(storeName);
                    items.forEach(item => store.put(item));
                    tx.oncomplete = () => resolve(true);
                    tx.onerror = () => reject(tx.error);
                });
            }
            async clearStore(storeName) {
                if (!this.db) await this.connect();
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction([storeName], 'readwrite');
                    const req = tx.objectStore(storeName).clear();
                    req.onsuccess = () => resolve(true);
                    req.onerror = () => reject(req.error);
                });
            }
            async deleteItem(storeName, key) {
                if (!this.db) await this.connect();
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction([storeName], 'readwrite');
                    const store = transaction.objectStore(storeName);
                    const request = store.delete(key);
                    request.onsuccess = () => resolve(true);
                    request.onerror = () => reject(request.error);
                });
            }
        }
        const dbService = new DBService();

                // --- NUEVOS: DATOS Y GRÁFICOS ---
                chart: <g><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></g>,

                mail: <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>,

                code: <polyline points="16 18 22 12 16 6"></polyline>,

                    {/* Dibuja el ícono desde el diccionario nuevo */}

        // --- COMPONENTE TOOLTIP GENÉRICO ---
        const InfoTooltip = ({ trigger, content, isError = false }) => {

        const Toast = ({ message, type, onClose }) => {
            useEffect(() => { const t = setTimeout(onClose, 4000); return () => clearTimeout(t); }, [onClose]);
            const colors = { success: 'bg-green-600', error: 'bg-red-600', info: 'bg-blue-600', warning: 'bg-yellow-500' };

                <div className={`fixed top-5 right-5 z-50 text-white px-6 py-4 rounded-lg shadow-xl flex items-center gap-3 slide-up ${colors[type] || 'bg-gray-800'}`}>

        const GlobalConfirmDialog = ({ isOpen, config, onClose }) => {
            if (!isOpen) return null;
            const { title, message, type = 'danger', onConfirm, confirmText = 'Confirmar' } = config;

                danger: { icon: 'trash', color: 'text-red-600', bg: 'bg-red-100', btn: 'bg-red-600 hover:bg-red-700' },

            const theme = styles[type] || styles.info;
            return (

        // --- COMPONENTE STATUS BAR (PARCHE v3.7 - Catastro Completo) ---
        const StatusBar = ({ stats, isVisible }) => {
            if (!isVisible) return null;

            const fmt = (n) => n ? n.toLocaleString('es-CL') : '0';
            const retentionRate = stats.raw > 0 ? ((stats.available / stats.raw) * 100).toFixed(1) : 0;

            // Helper para items de resta
            const StatItem = ({ label, value, color, icon }) => (
                <div className={`flex flex-col items-center px-4 border-r border-slate-800 last:border-0 transition-opacity ${value > 0 ? 'opacity-100' : 'opacity-25 grayscale'}`}>

                    <div className="max-w-7xl mx-auto px-4 py-2 flex items-center justify-between h-14">

        };

        // --- UTILS ---
        const readFile = (file) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                const isExcel = file.name.endsWith('.xlsx') || file.name.endsWith('.xls');
                reader.onload = (e) => {
                    try {
                        let data = [];
                        if (isExcel) {
                            const workbook = XLSX.read(e.target.result, { type: 'binary' });
                            const sheetName = workbook.SheetNames[0];
                            data = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], { defval: "" });
                        } else {
                            const csvData = Papa.parse(e.target.result, { header: true, skipEmptyLines: true });
                            data = csvData.data;
                        }
                        resolve({ name: file.name, data });
                    } catch (err) { reject(err); }
                };
                if (isExcel) reader.readAsBinaryString(file);
                else reader.readAsText(file);
            });
        };

        // --- COMPONENTE PORTAL TOOLTIP (PARCHE v1.1) ---
        // Renderiza el contenido fuera del flujo normal del DOM para evitar cortes
        const PortalTooltip = ({ trigger, content, isError = false }) => {
            const [visible, setVisible] = useState(false);
            const [coords, setCoords] = useState({ top: 0, left: 0 });
            const triggerRef = useRef(null);

            const handleMouseEnter = () => {
                if (triggerRef.current) {
                    const rect = triggerRef.current.getBoundingClientRect();
                    // Calcular posición: Centrado arriba del elemento
                    setCoords({
                        top: rect.top - 10, // 10px arriba del elemento
                        left: rect.left + (rect.width / 2) // Centro horizontal
                    });
                    setVisible(true);
                }
            };

            const handleMouseLeave = () => setVisible(false);

            return (
                <>
                    <span
                        ref={triggerRef}
                        onMouseEnter={handleMouseEnter}
                        onMouseLeave={handleMouseLeave}
                        className={`cursor-help border-b border-dotted ${isError ? 'text-red-600 border-red-300' : 'text-gray-700 border-gray-400'} font-medium`}
                    >
                        {trigger}
                    </span>

                    {visible && ReactDOM.createPortal(
                        <div
                            className="portal-tooltip-content bg-slate-800 text-white text-xs rounded p-3 max-w-xs text-center z-[99999]"
                            style={{
                                top: coords.top,
                                left: coords.left,
                                transform: 'translate(-50%, -100%)' // Mueve la caja hacia arriba y la centra
                            }}
                        >
                            {content}
                            {/* Flecha decorativa */}
                            <div className="absolute top-full left-1/2 transform -translate-x-1/2 border-4 border-transparent border-t-slate-800"></div>
                        </div>,
                        document.body // Renderizar directamente en el body
                    )}
                </>
            );
        };

        // --- COMPONENTE MULTI-SELECT (PARCHE v3.0) ---
        const MultiSelect = ({ options, value, onChange, placeholder = "Seleccionar..." }) => {
            const [isOpen, setIsOpen] = useState(false);
            const containerRef = useRef(null);

            // Cerrar al hacer click fuera
            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (containerRef.current && !containerRef.current.contains(event.target)) {
                        setIsOpen(false);
                    }
                };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);

            const handleToggle = (opt) => {
                const current = Array.isArray(value) ? value : [];
                const updated = current.includes(opt)
                    ? current.filter(v => v !== opt)
                    : [...current, opt];
                onChange(updated);
            };

            const selectedCount = Array.isArray(value) ? value.length : 0;

            return (
                <div className="relative w-1/3" ref={containerRef}>
                    <div
                        onClick={() => setIsOpen(!isOpen)}
                        className="w-full text-xs border bg-white rounded p-1.5 cursor-pointer flex justify-between items-center hover:border-blue-400 transition-colors"
                    >
                        <span className={`truncate font-bold ${selectedCount > 0 ? 'text-blue-700' : 'text-gray-400'}`}>
                            {selectedCount > 0 ? `${selectedCount} seleccionados` : placeholder}
                        </span>
                        <Icon name="arrowRight" size={10} className={`transform transition-transform ${isOpen ? 'rotate-90' : 'rotate-0'}`} />
                    </div>

                    {isOpen && (
                        <div className="absolute top-full left-0 w-64 bg-white border border-gray-200 shadow-xl rounded-lg mt-1 z-50 max-h-48 overflow-y-auto p-2 slide-up">
                            {options.length === 0 ? (
                                <div className="text-center text-gray-400 text-xs italic py-2">No hay valores</div>
                            ) : (
                                <div className="grid grid-cols-1 gap-1">
                                    {options.map((opt, i) => {
                                        const isSelected = Array.isArray(value) && value.includes(opt);
                                        return (
                                            <label key={i} className={`flex items-center gap-2 px-2 py-1.5 rounded cursor-pointer text-xs transition-colors ${isSelected ? 'bg-blue-50 text-blue-700 font-bold' : 'hover:bg-gray-50 text-gray-600'}`}>
                                                <input
                                                    type="checkbox"
                                                    checked={isSelected}
                                                    onChange={() => handleToggle(opt)}
                                                    className="rounded text-blue-600 focus:ring-0 cursor-pointer"
                                                />
                                                <span className="truncate">{opt}</span>
                                            </label>
                                        );
                                    })}
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };


        // --- MÓDULO ADMIN ---
        const AdminModule = ({ addToast, onNavigateHome, confirmAction }) => {
            const [activeTab, setActiveTab] = useState('campaigns');
            const [data, setData] = useState([]);
            const [campaigns, setCampaigns] = useState([]);
            const [loading, setLoading] = useState(false);
            // [Mejora 1.1] Estado actualizado para incluir lista de 'invalid'
            const [importModal, setImportModal] = useState({ open: false, conflicts: [], newItems: [], invalid: [] });
            const [editingId, setEditingId] = useState(null);
            const [editForm, setEditForm] = useState({});
            const [filterCampaign, setFilterCampaign] = useState('');
            const fileInputRef = useRef(null);

            // NUEVO: Estados para SQL Volátil
            const [sqlEngine, setSqlEngine] = useState('sqlserver');
            const [sqlForm, setSqlForm] = useState({ server: '', port: '3306', database: '', user: '', password: '' });
            const [sqlConnected, setSqlConnected] = useState(false);

            // Manejador de Conexión SQL
            const handleSqlConnect = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    // Construimos la configuración base (sin obligar la BBDD)
                    const dbConfig = {
                        engine: sqlEngine,
                        server: sqlForm.server,
                        port: parseInt(sqlForm.port) || 3306,
                        user: sqlForm.user,
                        password: sqlForm.password,
                        options: { encrypt: false, trustServerCertificate: true }
                    };

                    if (sqlForm.database && sqlForm.database.trim() !== '') {
                        dbConfig.database = sqlForm.database.trim();
                    }

                    const result = await window.nexusAPI.connectSQL(dbConfig);

                    if (result.success) {
                        setSqlConnected(true);
                        addToast('Conexión SQL establecida exitosamente', 'success');
                    } else {
                        setSqlConnected(false);
                        addToast('Error SQL: ' + result.error, 'error');
                    }
                } catch (err) {
                    addToast('Error de comunicación con el motor', 'error');
                }
                setLoading(false);
            };

            // Manejador de Desconexión
            const handleSqlDisconnect = () => {
                setSqlConnected(false);
                setSqlForm({ server: '', port: '3306', database: '', user: '', password: '' });
                addToast('Desconectado', 'info');
            };

            useEffect(() => { loadData(); setEditingId(null); setFilterCampaign(''); }, [activeTab]);

            const campaignsMap = useMemo(() => {
                const map = {};
                campaigns.forEach(c => map[c.code] = c.name);
                return map;
            }, [campaigns]);

            const loadData = async () => {
                setLoading(true);
                try {
                    const camps = await dbService.getAll('campaigns');
                    setCampaigns(camps);
                    if (activeTab === 'campaigns') { setData(camps); }
                    else { const types = await dbService.getAll('typifications'); setData(types); }
                }
                catch (error) { addToast('Error cargando datos', 'error'); }
                finally { setLoading(false); }
            };

            const filteredData = useMemo(() => {
                if (activeTab === 'campaigns' || !filterCampaign) return data;
                return data.filter(item => item.campaign === filterCampaign);
            }, [data, activeTab, filterCampaign]);

            const uniqueCampaigns = useMemo(() => {
                if (activeTab !== 'typifications') return [];
                return Array.from(new Set(data.map(item => item.campaign))).sort();
            }, [data, activeTab]);

            const startEditing = (item) => { setEditingId(activeTab === 'campaigns' ? item.code : item.id); setEditForm({ ...item }); };
            const cancelEditing = () => { setEditingId(null); setEditForm({}); };
            const handleInputChange = (field, value) => setEditForm(prev => ({ ...prev, [field]: value }));

            // MODIFICADO: Guardado inteligente (Genera ID automático para tipificaciones)
            const saveEditing = async () => {
                setLoading(true);
                try {
                    let itemToSave = { ...editForm };

                    // CORRECCIÓN: Eliminar la bandera 'isNew' antes de guardar.
                    // Esto evita que al recargar la app crea que el registro sigue en modo "creación" (input vacío).
                    if (itemToSave.isNew) delete itemToSave.isNew;

                    // Si es tipificación nueva o editada, regenerar ID compuesto para asegurar integridad
                    if (activeTab === 'typifications') {
                        if (!itemToSave.campaign || !itemToSave.status) throw new Error("Campaña y Status son obligatorios");
                        itemToSave.id = `${itemToSave.campaign.trim()}_${itemToSave.status.trim()}`;
                    }

                    await dbService.addOrUpdate(activeTab === 'campaigns' ? 'campaigns' : 'typifications', [itemToSave]);
                    addToast('Guardado correctamente', 'success');
                    setEditingId(null);
                    loadData();
                } catch (err) { addToast(err.message || 'Error al guardar', 'error'); } finally { setLoading(false); }
            };

            // NUEVO: Función para iniciar un registro en blanco
            const handleAddNew = () => {
                const tempId = `NEW_${Date.now()}`; // ID temporal para que React lo renderice
                // Creamos el objeto vacío según la pestaña activa
                const newItem = activeTab === 'campaigns'
                    ? { code: '', name: '', isNew: true }
                    : { id: tempId, campaign: filterCampaign || '', status: '', detail: '', managed: 1, closedOrAgenda: 0, ranking: 99, isContact: 0, isRPC: 0, isSuccess: 0, isNew: true };

                // Lo inyectamos visualmente al principio de la tabla
                setData(prev => [newItem, ...prev]);
                // Activamos modo edición inmediatamente
                setEditingId(activeTab === 'campaigns' ? newItem.code : newItem.id);
                setEditForm(newItem);
            };

            const handleDeleteItem = (item) => {
                const id = activeTab === 'campaigns' ? item.code : item.id;
                confirmAction({
                    title: 'Eliminar Registro', message: `¿Eliminar "${activeTab === 'campaigns' ? item.name : item.status}"?`,
                    type: 'danger', confirmText: 'Eliminar',
                    onConfirm: async () => {
                        await dbService.deleteItem(activeTab === 'campaigns' ? 'campaigns' : 'typifications', id);
                        addToast('Eliminado', 'success'); loadData();
                    }
                });
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0]; if (!file) return;
                Papa.parse(file, { header: true, skipEmptyLines: true, complete: (r) => processImport(r.data), error: () => addToast('Error archivo', 'error') });
                e.target.value = '';
            };

            const processImport = async (imported) => {
                const current = await dbService.getAll(activeTab === 'campaigns' ? 'campaigns' : 'typifications');
                const ids = new Set(current.map(i => activeTab === 'campaigns' ? i.code : i.id));

                const conflicts = [];
                const newItems = [];
                const invalid = [];

                imported.forEach(row => {
                    let item = null;
                    let id = null;

                    if (activeTab === 'campaigns') {
                        if (row.CAMPAIGN) {
                            id = row.CAMPAIGN.trim();
                            item = { code: id, name: row.NOMBRE_CAMPAIGN?.trim() || '' };
                        }
                    } else {
                        // [Mejora 1.3] Validación Estricta: Regex /^\d+$/ 
                        // Esto asegura que SOLO haya dígitos. "5B" fallará aquí.
                        const rankStr = row.MEJOR_GESTION ? String(row.MEJOR_GESTION).trim() : '';

                        if (rankStr !== '' && !/^\d+$/.test(rankStr)) {
                            invalid.push({ ...row, reason: 'Ranking contiene caracteres no numéricos' });
                        }
                        else if (row.CAMPAIGN && row.STATUS) {
                            id = `${row.CAMPAIGN.trim()}_${row.STATUS.trim()}`;
                            item = {
                                id,
                                campaign: row.CAMPAIGN.trim(),
                                status: row.STATUS.trim(),
                                detail: row.DETALLE || '',
                                managed: parseInt(row.GESTIONADO) || 0,
                                closedOrAgenda: parseInt(row['CERRADO/AGENDA']) || 0,
                                ranking: rankStr === '' ? 99 : parseInt(rankStr), // Usamos el valor limpio

                                // --- NUEVOS CAMPOS ANALÍTICAS (Soporte Multi-Cabecera) ---
                                // Busca: HUB o ES_CONTACTO o CONTACTO
                                isContact: parseInt(row['HUB'] || row['ES_CONTACTO'] || row['CONTACTO']) || 0,
                                // Busca: RPC o ES_RPC o TITULAR
                                isRPC: parseInt(row['RPC'] || row['ES_RPC'] || row['TITULAR']) || 0,
                                // Busca: EXITO o ES_EXITO o VENTA
                                isSuccess: parseInt(row['EXITO'] || row['ES_EXITO'] || row['VENTA']) || 0
                            };
                        }
                    }

                    if (item) ids.has(id) ? conflicts.push(item) : newItems.push(item);
                });

                if (conflicts.length > 0 || invalid.length > 0) {
                    setImportModal({ open: true, conflicts, newItems, invalid });
                }
                else if (newItems.length > 0) {
                    await dbService.addOrUpdate(activeTab === 'campaigns' ? 'campaigns' : 'typifications', newItems);
                    addToast(`Importados ${newItems.length}`, 'success');
                    loadData();
                }
                else {
                    addToast('Sin datos nuevos válidos', 'info');
                }
            };

            const resolveConflict = async (decision) => {
                let items = [...importModal.newItems];
                if (decision === 'overwrite') items = [...items, ...importModal.conflicts];
                await dbService.addOrUpdate(activeTab === 'campaigns' ? 'campaigns' : 'typifications', items);
                setImportModal({ open: false, conflicts: [], newItems: [] }); loadData(); addToast('Procesado', 'success');
            };

            const handleDeleteAll = () => {
                confirmAction({
                    title: 'Reset Fábrica', message: '¿BORRAR TODO? Se eliminarán Campañas y Tipificaciones.',
                    type: 'danger', confirmText: 'BORRAR TODO',
                    onConfirm: async () => {
                        setLoading(true);
                        await dbService.clearStore('campaigns'); await dbService.clearStore('typifications');
                        addToast('Reseteado', 'warning'); loadData(); setLoading(false);
                    }
                });
            };

            // NUEVA FUNCIÓN: Eliminar tipificaciones por campaña seleccionada
            const handleDeleteByCampaign = () => {
                if (!filterCampaign) return addToast('Selecciona una campaña específica primero', 'warning');

                confirmAction({
                    title: `Limpiar Campaña: ${filterCampaign}`,
                    message: `¿Estás seguro de que deseas ELIMINAR TODAS las tipificaciones asociadas a la campaña "${filterCampaign}"?\n\nEsta acción no afectará a otras campañas.`,
                    type: 'danger',
                    confirmText: 'Eliminar Grupo',
                    onConfirm: async () => {
                        setLoading(true);
                        try {
                            // 1. Obtener todas para filtrar los IDs correctos
                            const allTyps = await dbService.getAll('typifications');
                            const toDelete = allTyps.filter(t => t.campaign === filterCampaign);

                            if (toDelete.length === 0) {
                                addToast('No hay registros para eliminar en esta campaña', 'info');
                                return;
                            }

                            // 2. Ejecutar eliminación en paralelo
                            const deletePromises = toDelete.map(item => dbService.deleteItem('typifications', item.id));
                            await Promise.all(deletePromises);

                            addToast(`Se eliminaron ${toDelete.length} tipificaciones de ${filterCampaign}`, 'success');
                            loadData(); // Recargar tabla
                        } catch (err) {
                            console.error(err);
                            addToast('Error al eliminar el grupo', 'error');

            return (

                            <button onClick={() => setActiveTab('typifications')} className={`px-6 py-3 rounded-t-lg font-bold ${activeTab === 'typifications' ? 'bg-yellow-500 text-white' : 'bg-yellow-100 text-yellow-800'}`}>Tipificaciones</button>

                                        <button type="button" onClick={() => { setSqlEngine('mysql'); setSqlConnected(false); }} style={{ padding: '6px 18px', borderRadius: '8px', fontWeight: 'bold', fontSize: '0.85rem', border: '2px solid #f97316', background: sqlEngine === 'mysql' ? '#f97316' : 'white', color: sqlEngine === 'mysql' ? 'white' : '#f97316', cursor: 'pointer' }}>MySQL</button>
                                    </div>

                                {sqlConnected ? (

                                        <p className="text-green-600 text-sm mb-6">Los módulos dinámicos ya pueden realizar consultas a la base de datos <strong>{sqlForm.database}</strong>.</p>
                                        <button onClick={handleSqlDisconnect} className="bg-white border-2 border-green-600 text-green-700 px-6 py-2 rounded-lg font-bold hover:bg-green-50 transition-colors shadow-sm">

                                                {sqlEngine === 'mysql' && (

                                                        <input type="number" value={sqlForm.port} onChange={e => setSqlForm({ ...sqlForm, port: e.target.value })} className="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-orange-500 outline-none transition-shadow" placeholder="3306" />
                                                    </div>

                                            </div>

        const HomeView = ({ onNavigate, confirmAction, addToast }) => {

                        const code = await window.nexusAPI.readModule(name);
                        try { window.NexusModuleMeta = null; eval(code.split('window.NexusActiveModule')[0]); } catch (e) { }
                        const meta = window.NexusModuleMeta || {};
                        const icon = meta.icon || 'package';
                        const color = meta.color || 'bg-indigo-600';
                        const title = meta.title || name.replace(/\.(js|txt)$/i, '').replace(/_/g, ' ');
                        return { id: name, title, code, isUser: true, icon, color };

                    setUserModules(loadedModules);

            const openModuleManager = async () => {
                const files = await window.nexusAPI.listFiles();

            // Definición de Módulos Fijos (Sistema) + Dinámicos (Usuario)

                { id: 'admin', title: 'Administración', desc: 'Gestor de Campañas y Tipificaciones.', icon: 'settings', color: 'bg-yellow-500', status: 'active' }
            ];

            const allModules = [...systemModules, ...userModules];

            return (
                <div className="min-h-screen flex flex-col slide-up">
                    <div className="bg-slate-900 text-white py-16 px-6 text-center">
                        <h1 className="text-5xl font-bold mb-4">Nexus Strategy CC</h1>
                        <p className="text-xl text-slate-300">Gestión integral de datos Call Center</p>
                    </div>

                    <div className="flex-1 bg-gray-100 p-8">
                        <div className="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8 -mt-20">

        /* --- PASO 3: COMPONENTE CARGADOR DINÁMICO (EL SANDBOX - VERSIÓN FINAL) --- */
        const DynamicModuleLoader = ({ moduleCode, dependencies }) => {
            const [ModuleComponent, setModuleComponent] = useState(null);
            const [error, setError] = useState(null);

            useEffect(() => {
                if (!moduleCode) return;
                try {
                    // 1. Transpilación
                    let transpiled = Babel.transform(moduleCode, { presets: ['react'] }).code;

                    // 2. Limpiar el receptor global por seguridad
                    window.NexusActiveModule = null;

                    // 3. Ejecutar el código ofuscado
                    // El ofuscador hará su magia y guardará la función en window.NexusActiveModule
                    const evaluateModule = new Function(transpiled);
                    evaluateModule();

                    // 4. Extraer la fábrica (tu función)
                    const ModuleFactory = window.NexusActiveModule;

                    // Validación por si se nos olvida poner "window.NexusActiveModule" en el futuro
                    if (typeof ModuleFactory !== 'function') {
                        throw new Error("El código no asignó la función a window.NexusActiveModule");
                    }

                    // 5. Inyección de Dependencias
                    const RealComponent = ModuleFactory(dependencies);

                    if (typeof RealComponent !== 'function') throw new Error("El módulo no retornó un componente válido.");

                    setModuleComponent(() => RealComponent);
                } catch (err) {
                    console.error("Fallo al compilar módulo:", err);
                    setError(err.message);
                }
            }, [moduleCode]);

            if (error) return (
                <div className="p-10 max-w-2xl mx-auto mt-10 bg-red-50 border border-red-200 rounded-lg text-center">
                    <div className="text-red-500 mb-2"><Icon name="alert" size={32} className="mx-auto" /></div>
                    <h3 className="font-bold text-red-800">Error Crítico en Módulo</h3>
                    <p className="text-sm text-red-600 mt-2 font-mono bg-white p-2 rounded border border-red-100">{error}</p>
                </div>
            );

            if (!ModuleComponent) return (
                <div className="flex flex-col items-center justify-center h-64 text-gray-400">
                    <div className="spinner mb-3"></div>
                    <span>Cargando núcleo del módulo...</span>
                </div>
            );

            return <ModuleComponent />;
        };

        /* --- PASO 4: APP PRINCIPAL (ORQUESTADOR) --- */
        const App = () => {
            const [view, setView] = useState('home');
            const [activeModuleCode, setActiveModuleCode] = useState(null);

            const removeToast = (id) => setToasts(p => p.filter(t => t.id !== id));
            const confirmAction = (config) => setDialog({ isOpen: true, config });

            const nexusContext = {
                React,
                useState,
                useEffect,
                useMemo,
                useRef,
                ui: { Icon, PortalTooltip, Toast, MultiSelect, StatusBar },
                utils: { addToast, readFile, confirmAction },
                db: dbService,
                goHome: () => setView('home')

                <div className="antialiased text-slate-800 bg-slate-50 min-h-screen font-inter">

                                    setView('dynamic_runner');
                                } else {
                                    setView(target);
                                }
                            }}
                            confirmAction={confirmAction}
                            addToast={addToast}
                        />
                    )}

                    {view === 'admin' && <AdminModule addToast={addToast} onNavigateHome={() => setView('home')} confirmAction={confirmAction} />}


                    {view === 'dynamic_runner' && (
                        <div className="slide-up min-h-screen bg-gray-50">
                            <div className="bg-white border-b px-6 py-3 flex justify-between items-center shadow-sm sticky top-0 z-40">
                                <span className="text-xs font-bold text-indigo-600 uppercase tracking-wider">Módulo Externo</span>
                                <button onClick={() => setView('home')} className="text-sm text-gray-600 hover:text-gray-900 flex items-center gap-1">
                                    <Icon name="x" size={16} /> Cerrar Módulo
                                </button>
                            </div>
                            <DynamicModuleLoader
                                moduleCode={activeModuleCode}
                                dependencies={nexusContext}
                            />
                        </div>
                    )}

                    <GlobalConfirmDialog isOpen={dialog.isOpen} config={dialog.config} onClose={() => setDialog({ ...dialog, isOpen: false })} />
                    <div className="fixed top-0 right-0 p-4 z-[110] flex flex-col gap-2 pointer-events-none">
                        {toasts.map(t => <div key={t.id} className="pointer-events-auto"><Toast message={t.message} type={t.type} onClose={() => removeToast(t.id)} /></div>)}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);


    </script>
</body>

</html>
